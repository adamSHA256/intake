services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://intake:${PG_PASSWORD:-intake}@db:5432/intake
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: intake
      POSTGRES_PASSWORD: ${PG_PASSWORD:-intake}
      POSTGRES_DB: intake
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intake -d intake"]
      interval: 5s
      timeout: 5s
      retries: 10
